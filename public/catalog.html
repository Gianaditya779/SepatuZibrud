<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog — sepatuzibrud</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .catalog-header {
      padding: 130px 5% 50px;
      border-bottom: 1px solid var(--gray-border);
    }

    .catalog-header h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 900;
      letter-spacing: -2px;
      margin-bottom: 8px;
    }

    .catalog-header p {
      color: var(--gray-text);
      font-size: 1rem;
    }

    .catalog-body { padding: 48px 5% 100px; }

    .results-info {
      font-size: 0.85rem;
      color: var(--gray-text);
      margin-bottom: 32px;
    }

    .results-info span { color: var(--white); font-weight: 600; }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--gray-text);
    }

    .no-results h3 {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--gray-light);
      margin-bottom: 8px;
    }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .filter-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--gray-dark);
      border: 1px solid var(--gray-border);
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--gray-light);
      cursor: pointer;
      transition: var(--transition);
    }

    .filter-tag:hover { background: var(--gray-mid); }
    .filter-tag .remove { color: var(--gray-text); font-size: 0.9rem; }
  </style>
</head>
<body>

      <span>sepatuzibrud</span><span class="dot">.</span></a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/catalog.html" class="active">Catalog</a></li>

  <div class="mobile-nav" id="mobileNav">
    <a href="/">Home</a>
    <a href="/catalog.html">Catalog</a>
    <a href="/about.html">About</a>

  <!-- Header -->
  <div class="catalog-header">
    <div class="section-label">Semua Produk</div>
    <h1>Katalog Sepatu</h1>
    <p>Temukan sepatu impianmu dari koleksi kami</p>
  </div>

  <!-- Body -->
  <div class="catalog-body">

    <!-- Search & Filter -->
    <div class="search-filter-bar">
      <div class="search-input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Cari merek atau nama sepatu..." />
      </div>
      <select class="filter-select" id="filterSize">
        <option value="">Semua Ukuran</option>
        <option>37</option><option>38</option><option>39</option>
        <option>40</option><option>41</option><option>42</option>
        <option>43</option><option>44</option><option>45</option>
      </select>
      <select class="filter-select" id="filterCondition">
        <option value="">Semua Kondisi</option>
        <option value="baru">Baru</option>
        <option value="bekas">Bekas</option>
      </select>
      <select class="filter-select" id="filterPrice">
        <option value="">Semua Harga</option>
        <option value="0-500000">Di bawah 500rb</option>
        <option value="500000-1000000">500rb - 1jt</option>
        <option value="1000000-2000000">1jt - 2jt</option>
        <option value="2000000-5000000">2jt - 5jt</option>
        <option value="5000000-99999999">Di atas 5jt</option>
      </select>
      <select class="filter-select" id="filterStatus">
        <option value="">Semua Status</option>
        <option value="available">Tersedia</option>
        <option value="sold_out">Sold Out</option>
      </select>
    </div>

    <!-- Active filter tags -->
    <div class="filter-tags" id="filterTags"></div>

    <!-- Results info -->
    <div class="results-info" id="resultsInfo">Memuat produk...</div>

    <!-- Products Grid -->
    <div class="products-grid" id="productsGrid">
      <!-- Skeleton -->
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></div>
      <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line medium"></div><div class="skeleton-line short"></div></div></div>
    </div>
  </div>

  <script src="/js/script.js"></script>
  <script>
    // ─── State ────────────────────────────────────────────────
    let allProducts = [];
    let debounceTimer;

    // ─── Load products ────────────────────────────────────────
    async function loadProducts() {
      try {
        const products = await apiGet({ action: 'getAll' });
        allProducts = products;
        applyFilters();
      } catch (e) {
        document.getElementById('productsGrid').innerHTML = `
          <div class="no-results" style="grid-column:1/-1">
            <h3>Gagal memuat produk</h3>
            <p>Coba refresh halaman.</p>
          </div>`;
      }
    }

    // ─── Apply filters & search ───────────────────────────────
    function applyFilters() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const size = document.getElementById('filterSize').value;
      const condition = document.getElementById('filterCondition').value;
      const priceRange = document.getElementById('filterPrice').value;
      const status = document.getElementById('filterStatus').value;

      let filtered = [...allProducts];

      if (search) {
        filtered = filtered.filter(p =>
          p.name.toLowerCase().includes(search) ||
          p.brand.toLowerCase().includes(search)
        );
      }
      if (size) filtered = filtered.filter(p => p.sizes.includes(size));
      if (condition) filtered = filtered.filter(p => p.condition === condition);
      if (status) filtered = filtered.filter(p => p.status === status);
      if (priceRange) {
        const [min, max] = priceRange.split('-').map(Number);
        filtered = filtered.filter(p => p.price >= min && p.price <= max);
      }

      renderProducts(filtered);
      updateResultsInfo(filtered.length);
      updateFilterTags({ search, size, condition, priceRange, status });
    }

    // ─── Render products ──────────────────────────────────────
    function renderProducts(products) {
      const grid = document.getElementById('productsGrid');
      if (products.length === 0) {
        grid.innerHTML = `
          <div class="no-results" style="grid-column:1/-1">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <h3>Produk tidak ditemukan</h3>
            <p>Coba ubah filter atau kata kunci pencarian</p>
          </div>`;
        return;
      }
      grid.innerHTML = products.map(p => renderCard(p)).join('');
    }

    // ─── Update results info ──────────────────────────────────
    function updateResultsInfo(count) {
      document.getElementById('resultsInfo').innerHTML =
        `Menampilkan <span>${count}</span> produk`;
    }

    // ─── Update filter tags ───────────────────────────────────
    function updateFilterTags({ search, size, condition, priceRange, status }) {
      const container = document.getElementById('filterTags');
      const tags = [];
      if (search) tags.push({ label: `"${search}"`, clear: () => { document.getElementById('searchInput').value = ''; applyFilters(); } });
      if (size) tags.push({ label: `Ukuran ${size}`, clear: () => { document.getElementById('filterSize').value = ''; applyFilters(); } });
      if (condition) tags.push({ label: condition === 'baru' ? 'Baru' : 'Bekas', clear: () => { document.getElementById('filterCondition').value = ''; applyFilters(); } });
      if (priceRange) tags.push({ label: 'Filter Harga', clear: () => { document.getElementById('filterPrice').value = ''; applyFilters(); } });
      if (status) tags.push({ label: status === 'available' ? 'Tersedia' : 'Sold Out', clear: () => { document.getElementById('filterStatus').value = ''; applyFilters(); } });

      container.innerHTML = tags.map((t, i) =>
        `<span class="filter-tag" data-idx="${i}">${t.label} <span class="remove">×</span></span>`
      ).join('');

      container.querySelectorAll('.filter-tag').forEach((el, i) => {
        el.addEventListener('click', () => tags[i].clear());
      });
    }

    // ─── Event listeners ──────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(applyFilters, 300);
    });

    ['filterSize', 'filterCondition', 'filterPrice', 'filterStatus'].forEach(id => {
      document.getElementById(id).addEventListener('change', applyFilters);
    });

    // ─── Handle URL params (dari link brand di footer) ────────
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('brand')) {
      document.getElementById('searchInput').value = urlParams.get('brand');
    }

    loadProducts();
  </script>
</body>
